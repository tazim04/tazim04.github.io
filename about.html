<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>




    <style>
        body {
            margin: 0;
            
            
            min-height: 100%;
            min-width: 100%;
        }

        .container {
            height: 100vh;

            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: black;

            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr; /*fr == fraction of total space*/
            grid-template-rows: 60px 200px 460px;

            padding-top: 15px;

        }

        .container div {
            padding: 10px;
            user-select: none;
        }

        .name {
            grid-column-start: 1;
            grid-column-end: 3;

            display: flex;
            align-items: center;

            font-size: 20px;

            cursor: pointer;
            transition-duration: 0.2s;
        }

        .about, .about, .projects, .resume, .linkedin, .art {
            cursor: pointer;
            transition-duration: 0.2s;

            display: flex;
            align-items: center;

            font-size: 20px;
        }

        


        .name:hover, .about:hover, .projects:hover, .resume:hover, .linkedin:hover, .art:hover {
            background-color: #55a682;
            color: white;
        }


        .title {
            grid-column: 1 / 8;
            font-size: 40px;
            text-align: center;

            line-height: 180px;
            background-color: #55a682;
            color: white;
        }


        img {
            grid-column: 1 / 3;
            grid-row: 3;

            border-radius: 50%;
            
            height: auto;
            width: 440px;

            display: flex;
            justify-content: center;
            align-items: center;
        }
        .pic {
            background-color: lightgrey;
        }

        .about {
            
        }





    </style>


</head>
<body>


    <div class="container">

        

        <div class="name" onclick="location.href='../index.html'">Tazim Khan</div>
        <div class="about" onclick="location.href='about.html'">About Me</div>
        <div class="projects" onclick="location.href='projects.html'">Projects</div>
        <div class="resume">Resume</div>
        <div class="linkedin" onclick="window.open('https://www.linkedin.com/in/tazim-khan-434584254/','_newtab');" >LinkedIn</div>
        <div class="art">Digital Art</div>

        <div class="title">About Me</div>

        <div class="pic"><img src="me.jpg" alt="Tazim Khan"></div>

        <div class="aboutText">
            Hi, my name is Tazim Khan! I'm 19 years old, and I am currently a student at the University of Ottawa,
            stuyding Software Engineering.

        </div>



        





    </div>

    
</body>
</html>
